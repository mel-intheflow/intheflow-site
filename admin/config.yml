backend:
  name: git-gateway
  branch: main

site_url: https://intheflow.netlify.app/
display_url: https://intheflow.at/beta/
logo_url: /images/avatar.webp

media_folder: "images"
public_folder: "/beta/images"

publish_mode: simple

collections:
  - name: "home"
    label: "Startseite Inhalte"
    files:
      - label: "Home Content"
        name: "home_content"
        file: "content/home.json"
        format: "json"
        fields:
          - { label: "Brand Subtitle", name: "brand", widget: "object", fields: [{ label: "Subtitle", name: "subtitle", widget: "string" }] }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Top-Zitat", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Absätze", name: "paragraphs", widget: "list", field: { label: "Absatz", name: "p", widget: "text" } }
              - { label: "CTA Primär", name: "ctaPrimaryLabel", widget: "string" }
              - { label: "CTA Sekundär", name: "ctaSecondaryLabel", widget: "string" }
              - { label: "Badge Titel", name: "badgeTitle", widget: "string" }
              - { label: "Badge Text", name: "badgeText", widget: "text" }

          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Werdegang Headline", name: "leftHeading", widget: "string" }
              - { label: "Werdegang Absätze", name: "leftParagraphs", widget: "list", field: { label: "Absatz", name: "p", widget: "text" } }
              - { label: "Qualifikation Headline", name: "rightHeading", widget: "string" }
              - { label: "Zertifikate", name: "certificates", widget: "list", fields: [{ label: "Titel", name: "title", widget: "string" }, { label: "Link", name: "href", widget: "string" }] }
              - { label: "Info Note", name: "infoNote", widget: "text" }

          - label: "Ganzheitlicher Ansatz"
            name: "approach"
            widget: "object"
            fields:
              - { label: "Headline", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - label: "Eindrücke Karte"
                name: "impressions"
                widget: "object"
                fields:
                  - { label: "Kicker", name: "kicker", widget: "string", required: false }
                  - { label: "Titel", name: "title", widget: "string" }
              - label: "Bereiche"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Kicker", name: "kicker", widget: "string", required: false }
                  - { label: "Titel", name: "title", widget: "string" }
                  - { label: "Absätze", name: "paragraphs", widget: "list", field: { label: "Absatz", name: "p", widget: "text" } }

          - label: "Angebot Header"
            name: "angebot"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }

          - label: "Angebot Karten"
            name: "offerCards"
            widget: "list"
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Items", name: "items", widget: "list", required: false, field: { label: "Item", name: "item", widget: "string" } }
              - { label: "Absätze", name: "paragraphs", widget: "list", required: false, field: { label: "Absatz", name: "p", widget: "text" } }

          - label: "Hinweiskarte"
            name: "hinweis"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Items", name: "items", widget: "list", field: { label: "Item", name: "item", widget: "string" } }

          - label: "Kurse Header"
            name: "kurse"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }

          - label: "Kurskarten"
            name: "courseCards"
            widget: "list"
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Zeilen", name: "rows", widget: "list", field: { label: "Zeile", name: "row", widget: "string" } }

          - label: "Schnuppern"
            name: "schnuppern"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }

          - label: "Veranstaltungen Header"
            name: "veranstaltungen"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }

          - label: "Event Karten"
            name: "events"
            widget: "list"
            min: 3
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Text 1", name: "text", widget: "text" }
              - { label: "Text 2", name: "text2", widget: "text", required: false }
              - { label: "Text 3", name: "text3", widget: "text", required: false }
              - { label: "Format", name: "format", widget: "string" }
              - { label: "Häufigkeit", name: "haeufigkeit", widget: "string" }
              - { label: "Nächster Termin", name: "termin", widget: "string", required: false }

          - label: "Kontakt"
            name: "kontakt"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "WhatsApp Button", name: "whatsappLabel", widget: "string" }
              - { label: "Zitat", name: "quote", widget: "text" }
              - { label: "Zitat Text", name: "quoteText", widget: "text" }
              - { label: "Status Titel", name: "statusTitle", widget: "string" }
              - { label: "Status Text 1", name: "statusText1", widget: "text" }
              - { label: "Status Text 2", name: "statusText2", widget: "text" }
              - { label: "Impuls Titel", name: "impulsTitle", widget: "string" }
              - { label: "Impuls Text 1", name: "impulsText1", widget: "text" }
              - { label: "Impuls Text 2", name: "impulsText2", widget: "text" }

          - { label: "Footer", name: "footer", widget: "object", fields: [{ label: "Copyright", name: "copyright", widget: "string" }] }
